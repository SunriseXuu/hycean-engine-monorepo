[package]
name = "engine"
description = "Hycean Engine - A next-generation, highly performant 3D editor and rendering engine built for the modern web."
version = "0.1.0"
edition = "2024"
repository = "https://github.com/SunriseXuu/hycean-engine-monorepo"
license = "APGL-3.0-or-later"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
bevy = { version = "0.18.1", default-features = false, features = [
    "3d",
    "bevy_log",
    "bevy_asset",
    "bevy_winit",
    "bevy_core_pipeline",
    "bevy_render",
    "bevy_pbr",
    "bevy_gltf",
    "bevy_scene",
    "webgpu",
    "webgl2",
] }
console_error_panic_hook = "0.1.7"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
wasm-bindgen = "0.2.114"
